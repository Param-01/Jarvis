voice_auth:
  threshold: 0.50
  enrollment_samples: 3
  record_duration: 5
  sample_rate: 16000

wake_word:
  keyword: "jarvis"  # Options: jarvis, alexa, computer, hey google, ok google, porcupine
  sensitivity: 0.5   # 0.0 to 1.0 (higher = more sensitive but more false positives)

speech_to_text:
  model_size: "base"  # tiny, base, small, medium, large
  language: "en"
  command_duration: 5
  sample_rate: 16000